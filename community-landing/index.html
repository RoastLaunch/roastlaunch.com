<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/accelerator/">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://roastlaunch.com/accelerator/">
    <title>Redirecting to the Accelerator &mdash; Roast Launch</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            font-family: var(--font-body);
            background: var(--warm-white);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .redirect-wrap { max-width: 520px; }
        .redirect-wrap h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--espresso);
            margin-bottom: 12px;
        }
        .redirect-wrap p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .redirect-wrap a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: underline;
        }
    </style>
    <script>
        // JS fallback in case meta refresh is disabled.
        window.location.replace("/accelerator/");
    </script>
</head>
<body>
    <div class="redirect-wrap">
        <h1>This page has moved</h1>
        <p>The Accelerator page has a new home. You&rsquo;ll be redirected in a moment &mdash; or click below if nothing happens.</p>
        <p><a href="/accelerator/">Go to the Accelerator &rarr;</a></p>
    </div>
</body>
</html>
